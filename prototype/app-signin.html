<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in · Crown and Compass</title>
<link rel="stylesheet" href="proto.css?v=8" />
<style>
  body{background:var(--ink);}
  .auth-wrap{min-height:calc(100vh - 34px);display:grid;place-items:center;padding:56px 20px;}
  .auth{width:100%;max-width:440px;}
  .brand-mark{display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:34px;text-align:center;}
  .brand-mark img{height:88px;width:auto;filter:drop-shadow(0 10px 40px rgba(0,0,0,.5));}
  .brand-mark .name{font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--bone);}
  .auth .card{margin-bottom:16px;}
  .auth h1{font-size:1.9rem;margin:0 0 8px;}
  .auth .card-note{color:var(--muted);font-family:var(--body);font-size:16px;line-height:1.6;margin:0 0 22px;}
  .btn-block{display:block;width:100%;text-align:center;}
  .sent{background:var(--bone-2);}
  .sent .kicker{margin-bottom:10px;}
  .sent h2{font-size:1.4rem;margin:0 0 8px;}
  .sent p{color:var(--muted);font-family:var(--body);font-size:16px;line-height:1.6;margin:0;}
  .sent .em{color:var(--ink);font-weight:600;}
  .resend{margin-top:14px;font-size:15px;}
  .resend a{text-decoration:underline;}
</style>
</head>
<body>

<main class="auth-wrap">
  <div class="auth">
    <a class="brand-mark" href="app-dashboard.html">
      <img src="assets/cc-white.png" alt="Crown and Compass" />
      <span class="name">Crown &amp; Compass</span>
    </a>

    <div class="card">
      <h1>Sign in</h1>
      <p class="card-note">Enter your email and we'll send you a link. No password.</p>
      <form onsubmit="return false;">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <button class="btn btn-ember btn-block" type="submit">Email me a sign-in link</button>
      </form>
    </div>

    <div class="card sent">
      <p class="kicker">After you request a link</p>
      <h2>Check your email</h2>
      <p>We sent a link to <span class="em">you@example.com</span>. It lasts one hour.</p>
      <p class="resend"><a href="#">Send another link</a></p>
    </div>
  </div>
</main>
</body>
</html>
